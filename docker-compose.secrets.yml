# Optional local-secret overlay for Hermes.
#
# Usage:
#   mkdir -p secrets
#   printf '%s\n' 'github_pat_or_fine_grained_token' > secrets/github_token
#   chmod 600 secrets/github_token
#   docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#
# The secrets/ directory is ignored by git. Do not commit real credentials.

services:
  hermes-local:
    secrets:
      - github_token
    environment:
      GITHUB_TOKEN_FILE: /run/secrets/github_token
      GH_TOKEN_FILE: /run/secrets/github_token
      HERMES_CONFIGURE_GITHUB: ${HERMES_CONFIGURE_GITHUB:-1}

  workspace-cms:
    secrets:
      - github_token
    environment:
      GITHUB_TOKEN_FILE: /run/secrets/github_token
      GH_TOKEN_FILE: /run/secrets/github_token
      HERMES_CONFIGURE_GITHUB: ${HERMES_CONFIGURE_GITHUB:-1}

secrets:
  github_token:
    file: ${HERMES_GITHUB_TOKEN_FILE:-./secrets/github_token}
