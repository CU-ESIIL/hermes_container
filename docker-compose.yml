services:
  hermes-local:
    image: oasis-hermes
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${HERMES_CONTAINER_NAME:-hermes-local}
    working_dir: /data/workspace
    stdin_open: true
    tty: true
    env_file:
      - path: .env
        required: false
    environment:
      DATA_ROOT: /data
      HERMES_HOME: /data/.hermes
      HERMES_STATE_DIR: /data/.hermes
      HERMES_WORKSPACE: /data/workspace
      EXTERNAL_STORAGE_ROOT: /external_storage
      HERMES_CMS_PORT: ${HERMES_CMS_PORT:-8090}
      HERMES_STORAGE_CONFIG: /repo/storage/storage.yml
      HERMES_BRANDING: ${HERMES_BRANDING:-1}
      HERMES_PROJECT_TITLE: ${HERMES_PROJECT_TITLE:-OASIS Hermes Working Group}
      HERMES_PORT: ${HERMES_PORT:-18789}
      HERMES_HOST: 0.0.0.0
      HERMES_SEED_WORKSPACE: ${HERMES_SEED_WORKSPACE:-1}
      HERMES_INIT_WORKING_GROUP: ${HERMES_INIT_WORKING_GROUP:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_FILE: ${OPENAI_API_KEY_FILE:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      VERDE_LLM_BASE_URL: ${VERDE_LLM_BASE_URL:-}
      VERDE_LLM_API_KEY: ${VERDE_LLM_API_KEY:-}
      VERDE_LLM_API_KEY_FILE: ${VERDE_LLM_API_KEY_FILE:-}
      AI_VERDE_API_KEY: ${AI_VERDE_API_KEY:-}
      AI_VERDE_API_KEY_FILE: ${AI_VERDE_API_KEY_FILE:-}
      VERDE_LLM_DEFAULT_MODEL: ${VERDE_LLM_DEFAULT_MODEL:-}
      VERDE_LLM_PROVIDER_NAME: ${VERDE_LLM_PROVIDER_NAME:-}
      NOUS_API_KEY: ${NOUS_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WORKSPACE_UI_PORT: ${WORKSPACE_UI_PORT:-8888}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_TOKEN_FILE: ${GITHUB_TOKEN_FILE:-}
      GH_TOKEN: ${GH_TOKEN:-}
      GH_TOKEN_FILE: ${GH_TOKEN_FILE:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TAVILY_API_KEY_FILE: ${TAVILY_API_KEY_FILE:-}
    volumes:
      - ${HERMES_STATE_DIR:-~/.hermes}:/data/.hermes
      - ${DATA_DIR:-./data}:/data
      - ${WORKSPACE_DIR:-./workspace}:/data/workspace
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - ${EXTERNAL_STORAGE_DIR:-./external_storage}:/external_storage/local
      - ${HERMES_RUNTIME_SECRETS_DIR:-./secrets}:/run/hermes-secrets:ro
      - ./storage:/repo/storage:ro
    ports:
      - "127.0.0.1:${HERMES_PORT:-18789}:${HERMES_PORT:-18789}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cpus: "${HERMES_CONTAINER_CPUS:-2.0}"
    mem_limit: ${HERMES_CONTAINER_MEMORY:-50g}
    deploy:
      resources:
        limits:
          cpus: "${HERMES_CONTAINER_CPUS:-2.0}"
          memory: ${HERMES_CONTAINER_MEMORY:-50g}
    command:
      - bash
      - -lc
      - |
        hermes dashboard --host "${HERMES_HOST:-0.0.0.0}" --port "${HERMES_PORT:-18789}" ||
        hermes dashboard --port "${HERMES_PORT:-18789}" ||
        hermes gateway run --no-supervise

  workspace-ui:
    image: oasis-hermes
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /data
    entrypoint:
      - /usr/bin/tini
      - --
    environment:
      DATA_ROOT: /data
      HERMES_WORKSPACE: /data/workspace
      EXTERNAL_STORAGE_ROOT: /external_storage
      HERMES_STORAGE_CONFIG: /repo/storage/storage.yml
      HERMES_BRANDING: ${HERMES_BRANDING:-1}
      HERMES_PROJECT_TITLE: ${HERMES_PROJECT_TITLE:-OASIS Hermes Working Group}
      WORKSPACE_UI_PORT: ${WORKSPACE_UI_PORT:-8888}
      JUPYTER_TOKEN: ${WORKSPACE_UI_TOKEN:-hermes}
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ${WORKSPACE_DIR:-./workspace}:/data/workspace
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - ${EXTERNAL_STORAGE_DIR:-./external_storage}:/external_storage/local
      - ./storage:/repo/storage:ro
    ports:
      - "127.0.0.1:${WORKSPACE_UI_PORT:-8888}:8888"
    command:
      - python3
      - -m
      - jupyter
      - lab
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --allow-root
      - --ServerApp.root_dir=/data
      - --ServerApp.token=${WORKSPACE_UI_TOKEN:-hermes}

  workspace-cms:
    image: oasis-hermes
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /data
    entrypoint:
      - /usr/bin/tini
      - --
      - /usr/local/bin/hermes-service-entrypoint
    env_file:
      - path: .env
        required: false
    environment:
      DATA_ROOT: /data
      HERMES_WORKSPACE: /data/workspace
      HERMES_PORT: ${HERMES_PORT:-18789}
      EXTERNAL_STORAGE_ROOT: /external_storage
      HERMES_CMS_PORT: 8090
      HERMES_GATEWAY_URL: ${HERMES_GATEWAY_URL:-}
      HERMES_STORAGE_CONFIG: /repo/storage/storage.yml
      HERMES_REPO_ROOT: /repo
      HERMES_CMS_ROOTS: /workspace,/data/outputs,/repo/docs,/repo/examples,/repo/storage,/external_storage/local
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GH_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ${WORKSPACE_DIR:-./workspace}:/data/workspace
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - ${EXTERNAL_STORAGE_DIR:-./external_storage}:/external_storage/local
      - ${HERMES_RUNTIME_SECRETS_DIR:-./secrets}:/run/hermes-secrets:ro
      - ./docs:/repo/docs
      - ./examples:/repo/examples:ro
      - ./storage:/repo/storage:ro
    ports:
      - "127.0.0.1:${HERMES_CMS_PORT:-8090}:8090"
    command:
      - python3
      - /opt/hermes/cms/hermes_cms.py
